name: F-Droid reproducible build

# Builds the fdroid flavor's release APK on Linux CI, matching the
# environment F-Droid's own build server uses, so the unsigned APK produced
# here can be diffed against F-Droid's reproducible build for verification.
# Manually triggered per release (not on every push) since it's only needed
# when preparing a new tag for F-Droid.

on:
  workflow_dispatch:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: android
        run: chmod +x ./gradlew

      - name: Build fdroid flavor release (unsigned)
        working-directory: android
        run: ./gradlew assembleFdroidRelease --no-daemon --stacktrace

      - name: Upload unsigned fdroid release APK
        uses: actions/upload-artifact@v4
        with:
          name: fdroid-release-unsigned
          path: "android/app/build/outputs/apk/fdroid/release/app-fdroid-release-unsigned.apk"
          if-no-files-found: error
