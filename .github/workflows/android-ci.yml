name: Android CI

# Builds the debug APK on every push and pull request so the project
# never silently breaks. No signing secrets are needed for the debug build.

on:
  push:
    branches: [ main ]
    paths:
      - 'Volume control/**'
      - '.github/workflows/android-ci.yml'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        working-directory: "Volume control"
        run: chmod +x ./gradlew

      - name: Build debug APK
        working-directory: "Volume control"
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: granular-volume-debug
          path: "Volume control/app/build/outputs/apk/debug/*.apk"
          if-no-files-found: warn
