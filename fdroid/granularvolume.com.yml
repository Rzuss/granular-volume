AutoName: Granular Volume

Summary: Lower volume below your phone's minimum when it's still too loud
Description: |-
  Sometimes the lowest volume setting is still too loud. Granular Volume adds
  the volume levels your phone leaves out, below the hardware minimum, through
  a small dial that floats over any app.

  Drag it anywhere, tuck it to an edge, close it with one tap. It does not
  override your volume buttons or replace the system volume panel. It just
  sits on top.

  No equalizer, no presets, no account, no network access, no tracking.
  Single purpose by design.

  For white noise next to a sleeping baby, sensitive IEMs where step one is
  already loud, late-night listening, or any quiet room.

