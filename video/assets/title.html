<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Granular Volume</title>
<style>
  :root{ --accent:#6C63FF; --accent2:#22d3ee; --txt:#f4f6ff; --muted:#9aa3c7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;width:100%;overflow:hidden;background:#0a0e1d;}
  body{
    font-family:"Roboto","Segoe UI",system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(90% 60% at 50% 28%, #232a55 0%, rgba(35,42,85,0) 60%),
      radial-gradient(80% 50% at 80% 80%, #2a1c54 0%, rgba(42,28,84,0) 55%),
      linear-gradient(180deg,#121833 0%, #0a0e1d 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;text-align:center;
  }
  .stage{display:flex;flex-direction:column;align-items:center;transform:translateY(-20px);}
  .iconwrap{position:relative;width:260px;height:260px;display:flex;align-items:center;justify-content:center;}
  .halo{position:absolute;width:120%;height:120%;border-radius:50%;
    background:radial-gradient(circle, rgba(108,99,255,.55) 0%, rgba(108,99,255,0) 65%);
    filter:blur(16px);}
  .icon{position:relative;width:230px;height:230px;border-radius:54px;
    background:linear-gradient(135deg,#16162B 0%, #4A43C9 100%);
    box-shadow:0 28px 70px rgba(74,67,201,.5), inset 0 0 0 1px rgba(255,255,255,.06);
    display:flex;align-items:center;justify-content:center;}
  .icon img{width:100%;height:100%;display:block;}
  h1{font-size:62px;font-weight:800;letter-spacing:.5px;margin-top:40px;}
  .tag{font-size:27px;color:var(--muted);font-weight:500;margin-top:16px;letter-spacing:.3px;}
  .tag b{color:#c7c3ff;font-weight:600;}
  .rule{width:150px;height:4px;border-radius:4px;margin-top:32px;
    background:linear-gradient(90deg,var(--accent),var(--accent2));}
</style>
</head>
<body>
  <div class="stage">
    <div class="iconwrap">
      <div class="halo"></div>
      <div class="icon"><img src="icon_fg.png?v=1" alt=""></div>
    </div>
    <h1>Granular Volume</h1>
    <div class="tag">Precise volume. <b>Every app.</b></div>
    <div class="rule"></div>
  </div>
<script>
  function fs(){ var el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); }
  document.addEventListener('click', fs, {once:true});
</script>
</body>
</html>
