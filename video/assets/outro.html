<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Granular Volume</title>
<style>
  :root{ --accent:#6C63FF; --accent2:#22d3ee; --txt:#f4f6ff; --muted:#9aa3c7; }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;width:100%;overflow:hidden;background:#0a0e1d;}
  body{
    font-family:"Roboto","Segoe UI",system-ui,sans-serif;color:var(--txt);
    background:
      radial-gradient(90% 60% at 50% 30%, #232a55 0%, rgba(35,42,85,0) 60%),
      linear-gradient(180deg,#121833 0%, #0a0e1d 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;text-align:center;
  }
  .stage{display:flex;flex-direction:column;align-items:center;}
  .icon{position:relative;width:180px;height:180px;border-radius:44px;
    background:linear-gradient(135deg,#16162B 0%, #4A43C9 100%);
    box-shadow:0 22px 60px rgba(74,67,201,.5), inset 0 0 0 1px rgba(255,255,255,.06);
    display:flex;align-items:center;justify-content:center;}
  .icon img{width:100%;height:100%;display:block;}
  h1{font-size:56px;font-weight:800;margin-top:32px;letter-spacing:.5px;}
  .feats{display:flex;gap:14px;margin-top:28px;}
  .chip{font-size:22px;color:#d7d9ee;background:rgba(255,255,255,.06);
    border:1px solid rgba(255,255,255,.10);border-radius:999px;padding:12px 24px;font-weight:500;}
  .cta{margin-top:46px;display:flex;align-items:center;gap:15px;
    background:linear-gradient(145deg,var(--accent),#8b7bff);
    padding:21px 40px;border-radius:18px;box-shadow:0 18px 50px rgba(108,99,255,.5);}
  .cta .play{width:36px;height:36px;}
  .cta .txt{text-align:left;line-height:1.12;}
  .cta .small{font-size:15px;color:#e9e7ff;opacity:.9;font-weight:500;}
  .cta .big{font-size:26px;font-weight:700;color:#fff;}
</style>
</head>
<body>
  <div class="stage">
    <div class="icon"><img src="icon_fg.png?v=1" alt=""></div>
    <h1>Granular Volume</h1>
    <div class="feats">
      <div class="chip">No ads</div>
      <div class="chip">Free</div>
      <div class="chip">Lightweight</div>
    </div>
    <div class="cta">
      <svg class="play" viewBox="0 0 24 24" fill="none"><path d="M4 3.5 L20 12 L4 20.5 Z" fill="#ffffff"/></svg>
      <div class="txt"><div class="small">Coming soon to</div><div class="big">Google Play</div></div>
    </div>
  </div>
<script>
  function fs(){ var el=document.documentElement; if(el.requestFullscreen) el.requestFullscreen().catch(function(){}); }
  document.addEventListener('click', fs, {once:true});
</script>
</body>
</html>
