# Project-wide Gradle settings.

# JVM args for the Gradle daemon — 2 GB heap is plenty for this small module.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Dline.separator=\n

# Run independent project tasks in parallel where possible.
org.gradle.parallel=true

# Cache build outputs to speed up incremental builds.
org.gradle.caching=true

# AndroidX is required — this project uses androidx.* artifacts exclusively.
android.useAndroidX=true

# Generate a per-module R class (smaller, faster) instead of a transitive one.
android.nonTransitiveRClass=true

# Kotlin official code style.
kotlin.code.style=official
